<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicMusic</title>
    <script>
        // 在CSS加载前就设置主题，防止闪烁
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <button class="menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <div class="logo">CubicMusic</div>
            </div>
            <div class="search-container">
                <input type="text" placeholder="搜索音乐、歌手或专辑" class="search-input">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="search-icon">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </div>
            <div class="header-right">
                <button class="upload-button" onclick="document.getElementById('music-upload').click()">
                    <span class="upload-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24">
                            <path fill="white" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3zm-5.55-8h-2.9v3H8l4 4 4-4h-2.55z"/>
                        </svg>
                    </span>
                    <span class="upload-text">上传音乐</span>
                </button>
                <input type="file" id="music-upload" accept="audio/*" multiple style="display: none;">
            </div>
        </header>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <button class="sidebar-btn active">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                    </svg>
                    首页
                </button>
                <button class="sidebar-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
                    </svg>
                    播放列表
                </button>
                <button class="sidebar-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                    设置
                </button>
            </div>
            <div class="sidebar-playlists">
                <h3>更多</h3>
                <ul>
                    <li>测试</li>
                </ul>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">

            <section class="content-section active" id="home-content">
                <div class="home-message">
                    <h1>来听点什么?</h1>
                    <p>请上传本地歌曲以开始播放</p>
                </div>
            </section>

            <section class="content-section" id="playlist-content">
                <h1>播放列表</h1>
                <div class="local-track-list">
                    <div class="track-header">
                        <div class="track-cover"></div>
                        <div class="track-number">#</div>
                        <div class="track-info">标题/艺术家</div>
                        <div class="track-album">专辑</div>
                        <div class="track-duration">时长</div>
                    </div>
                    <div class="track-list-empty">
                        <p>暂无播放列表，请从本地音乐中添加</p>
                    </div>
                </div>
            </section>

            <section class="content-section" id="settings-content">
                <h1>设置</h1>
                <div class="settings-container">
                    <div class="settings-section">
                        <h2>播放设置</h2>
                        <div class="setting-item">
                            <label>自动播放</label>
                            <input type="checkbox" id="autoplay-toggle">
                        </div>
                        <div class="setting-item">
                            <label>循环播放</label>
                            <select id="loop-mode">
                                <option value="none">不循环</option>
                                <option value="all">列表循环</option>
                                <option value="single">单曲循环</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h2>音质设置</h2>
                        <div class="setting-item">
                            <label>音频质量</label>
                            <select id="audio-quality">
                                <option value="low">低</option>
                                <option value="medium" selected>中</option>
                                <option value="high">高</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h2>外观设置</h2>
                        <div class="setting-item">
                            <label>主题</label>
                            <select id="theme-select">
                                <option value="light" selected>浅色</option>
                                <option value="dark">深色</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>侧边栏展示</label>
                            <select id="sidebar-mode">
                                <option value="follow" selected>跟随UI</option>
                                <option value="floating">悬浮菜单</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>全屏背景</label>
                            <select id="fullscreen-background">
                                <option value="monet" selected>莫奈取色</option>
                                <option value="blur">封面模糊</option>
                                <option value="acrylic">亚克力</option>
                                <option value="black">纯黑</option>
                            </select>
                        </div>
                        <div class="setting-item" id="footer-monet-container">
                            <label>底栏跟随全屏背景</label>
                            <input type="checkbox" id="footer-monet">
                        </div>
                        <div class="setting-item">
                            <label>歌词对齐</label>
                            <select id="lyrics-align">
                                <option value="left" selected>左对齐</option>
                                <option value="center">居中对齐</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 播放器底部 -->
        <footer class="player-footer">
            <div class="player-info">
                <div class="player-image">
                    <img src="data:image/svg+xml;charset=utf-8,%3Csvg%20width%3D%2264%22%20height%3D%2264%22%20viewBox%3D%220%200%2064%2064%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2232%22%20font-family%3D%22Arial%22%20font-size%3D%228%22%20fill%3D%22white%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3E音乐%3C%2Ftext%3E%3C%2Fsvg%3E" alt="当前播放">
                </div>
                <div class="player-details">
                    <h4>未播放音乐</h4>
                    <p>请上传并选择音乐</p>
                </div>
                <div class="player-favorite">
                    <button class="favorite-btn" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="player-controls">
                <div class="control-buttons">
                    <button class="control-btn" id="prev-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/>
                        </svg>
                    </button>
                    <button class="control-btn play-btn">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn" id="next-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>
                <div class="progress-container">
                    <span class="time">0:00</span>
                    <div class="progress-bar">
                        <div class="progress-filled" style="width: 0%">
                            <div class="progress-wave"></div>
                        </div>
                    </div>
                    <span class="time">0:00</span>
                </div>
            </div>
            <div class="player-volume">
                <button class="volume-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm16.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <div class="volume-bar">
                    <div class="volume-filled"></div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
